t:6px;transition:0.2s}.option-item.selected .opt-letter{background:#1a73e8;color:#fff}.penguin-bubble{background:#fff;border:2px solid #e0e0e0;border-radius:16px;padding:8px 18px;display:inline-block;font-size:.9rem;margin-bottom:4px}.penguin-emoji{font-size:38px;display:block}.result-emoji-row{font-size:2.8rem;letter-spacing:10px;text-align:center;margin:10px 0}.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}.browse-card{background:#fff;border:2px solid #eef;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:0.2s}.browse-card:hover{border-color:#1a73e8;transform:translateY(-2px)}.filter-chip{padding:5px 14px;border-radius:18px;border:2px solid #e0e0e0;font-size:.75rem;font-weight:500;background:#fff;cursor:pointer;margin:2px;display:inline-block;transition:0.2s}.filter-chip.active{border-color:var(--primary);background:#e8f0fe;color:var(--primary);font-weight:700}

<script>
(function() {
  console.log('✅ IRTI 脚本开始加载……');
  window.__JS_LOADED__ = true;

  const questions = [
    {id:1,dim:'E',name:'情绪波动性',text:'当您持仓的资产毫无征兆地大跌15%时，您的第一反应是？',opts:['极度恐慌，想立即全部卖出','焦虑不安，想先抛出一部分避避风头','冷静分析原因，考虑是否达到补仓点位','几乎无感，甚至没注意到']},
    {id:2,dim:'T',name:'流动性周期',text:'您如何看待投资账户里的钱，与日常开销的界限？',opts:['混在一起，随时要调度','有大致的分隔，但偶尔会挪用','严格隔离，各账户各司其职','有严格的资产规划框架，并能动态调整流动性层级']},
    {id:3,dim:'C',name:'认知复杂度',text:'您认为自己在投资决策中，最靠得住的是？',opts:['财经大V、朋友或理财经理的建议','过去几年顺手的经验和感觉','一套可迭代的投资框架和评估体系','经历过牛熊考验的系统，并能自我修正认知偏误']},
    {id:4,dim:'F',name:'财务承载力',text:'剔除房产后，您的可投资资产大约相当于多少年的家庭年度总支出？',opts:['不足1年','1-5年','5-15年','15年以上']},
    {id:5,dim:'E',name:'情绪波动性',text:'您如何评价过去一年里自己做的最糟糕的一笔投资？',opts:['彻夜难眠，至今后悔不已','偶尔想起仍感到不舒服','作为一次学习案例，已坦然翻篇','盈亏同源，完全接受，无情绪残留']},
    {id:6,dim:'C',name:'认知复杂度',text:'关于"分散投资"，哪种说法更接近您的真实认知？',opts:['把钱买十只不同的股票或多只基金','股基、债基都买一点','在相关性较低的资产、地域和策略上进行配置','在理解风险因子的前提下，为真正的好机会做集中与分散的平衡']},
    {id:7,dim:'F',name:'财务承载力',text:'面对一次非预期的重大开支（如家人医疗、意外维修），您通常如何应对？',opts:['必须赎回投资或借贷才能解决','动用应急储备金，对投资组合略有影响','当月的现金流即可轻松覆盖','现金流极充裕，甚至是逆向加仓的机会']},
    {id:8,dim:'T',name:'流动性周期',text:'对于一笔亏损的投资，您容忍的最长回本等待时间是？',opts:['1-3个月，无法忍受更久','1年左右，到年底不行就换','3-5年，能伴随优质标地走过周期','没有期限要求，只关注终局价值']},
    {id:9,dim:'E',name:'情绪波动性',text:'当市场出现连续缓慢下跌（阴跌）时，您会？',opts:['极度烦躁，最终止损离场','心情压抑，停止定投转为观望','保持纪律，继续原有投资计划','逆势分批加仓，期待收集更便宜的筹码']},
    {id:10,dim:'F',name:'财务承载力',text:'您的职业生涯或企业经营，目前处于哪个阶段？',opts:['起步或动荡期，有亏损或极不稳定','稳步上升期，收入可期','成熟鼎盛期，有深厚护城河','已完成退出或拥有专业代理人，步入财富自由']},
    {id:11,dim:'C',name:'认知复杂度',text:'对于"雪球产品、量化对冲、期权套利"等名词，您的了解程度是？',opts:['完全没听过，或完全不知道在说什么','听过，大致知道是高风险或复杂产品，但不清楚原理','清楚其运作原理、收益结构及潜在风险','精通一项或多项，可自行构建策略或能审视其条款漏洞']},
    {id:12,dim:'T',name:'流动性周期',text:'这笔用来投资的钱，您认为最长可以不动用的期限是？',opts:['6个月以内，随时可能急用','1-3年，是为中期计划储备的','3-10年，明确为长期目标（如子女教育、退休）','10年以上，纯粹为财富传承']},
    {id:13,dim:'F',name:'财务承载力',text:'如果您的投资组合在短期内缩水30%，对您的生活会产生什么影响？',opts:['生活无以为继，必须立即变现保命','会心疼，需要缩减部分非必要消费','短期内不影响生活，但会重新审视布局','几乎无感，生活质量不因此动摇分毫']},
    {id:14,dim:'E',name:'情绪波动性',text:'假设市场暴跌，所有人都在喊"现金为王"，您会？',opts:['恐慌跟随，先跑出来再说','内心很挣扎，但会减少高风险敞口','检视自己持有的是否是优质资产，决定去留','很兴奋，觉得机会来了，准备资金进场']},
    {id:15,dim:'C',name:'认知复杂度',text:'您如何理解"投资中的安全边际"？',opts:['没听过这个概念','相当于买了不会跌的产品','用低于内在价值的价格买入，为可能的误判留有余地','不仅是价格折扣，还包括护城河、现金流韧性等立体结构']},
    {id:16,dim:'T',name:'流动性周期',text:'您近期（1年内）是否有例如购房、购车等明确的资金安排？',opts:['有，且资金量巨大，是当前全部储蓄','有部分计划，会占到流动性资产的一半左右','暂无，短期无硬性大额支出','不仅没有，反而在寻找长期配置的理由']},
    {id:17,dim:'E',name:'情绪波动性',text:'买入一只基金或股票后，您查看账户的频率是？',opts:['每天数次，忍不住频繁刷新','每天一次，像看天气预报','每周一两次，定期复盘','每月甚至更久，或者完全忘记']},
    {id:18,dim:'C',name:'认知复杂度',text:'您认为决定一只主动管理基金业绩最关键的因素是？',opts:['最近一两个月的涨跌幅排名','基金公司的品牌大小','基金经理的投资理念和知行合一的能力','其策略与当下市场环境匹配的深层逻辑，及团队风控体系']},
    {id:19,dim:'F',name:'财务承载力',text:'您目前的负债情况（房贷、车贷、经营贷等）如何？',opts:['负债沉重，月供压力巨大','有温和负债，月供占比在安全线内','负债极少或已还清','零负债，或负债是主动利用低息杠杆的工具']},
    {id:20,dim:'T',name:'流动性周期',text:'当出现短期资金周转困难时，您首先考虑的是？',opts:['立刻赎回股票或基金','先用信用贷或亲友周转，随后再补','用已备好的、投资周期匹配的现金或类现金覆盖','启用资产组合中早已预设好的流动性管理工具']},
    {id:21,dim:'E',name:'情绪波动性',text:'与朋友交流时，您更符合以下哪种描述？',opts:['"最近市场太差，我觉都睡不好，割肉出来了。"','"最近账户跌了，心里不踏实，先看看再说。"','"我的组合最近有些回撤，但在预期内，按计划执行。"','"不太关心短期，聊点别的吧。"']},
    {id:22,dim:'C',name:'认知复杂度',text:'您如何评估一只私募股权（PE）或信托产品的风险？',opts:['听销售怎么说，熟人买了就跟着买','看公司名气大不大，有无刚兑暗示','自己通读合同，重点看底层资产、退出机制和风控条款','除C以外，还要判断管理人道德风险、行业周期和极端压力情形']},
    {id:23,dim:'F',name:'财务承载力',text:'您的储蓄或投资本金中，需要随时用来支撑家庭紧急开支的部分占比多少？',opts:['几乎全部','较大一部分','很小的明确部分','趋近于零']},
    {id:24,dim:'T',name:'流动性周期',text:'如果投资中的一部分本金被锁定5年不能退出，您会？',opts:['完全不能接受，这让我极度不安','可以拿一小部分不影响生活的钱参与','如果策略优秀且流动性折价合理，愿意配置','能接受，这部分资金本就是为锁定长期优质资产规划的']},
    {id:25,dim:'E',name:'情绪波动性',text:'一笔投资盈利15%和亏损10%给您带来的心理感受，哪一种更强烈？',opts:['亏损10%的痛苦远超盈利15%的喜悦','亏损带来的不安略强于盈利的喜悦','两者感受大致对等，都是常态','对这两个数字的波动都已无太大情绪起伏']},
    {id:26,dim:'C',name:'认知复杂度',text:'当被推销一个"有保底条款且预期收益很高"的产品时，您的反应是？',opts:['这么好的事，得赶快买','有点怀疑，但看条款如果白纸黑字就买','会穿透看风险敞口在哪，再判断是否可能','本能觉得不符合金融常识，宁可错过也不轻易入场']},
    {id:27,dim:'T',name:'流动性周期',text:'您投资组合的"再平衡"频率，或者看待周期的方式接近哪种？',opts:['从不考虑，每天都在交易或追逐热点','半年到一年，跟着市场情绪调整','以年度为单位，纪律性地重新调整','顺应大周期，以数年为刻度进行战略重构']},
    {id:28,dim:'F',name:'财务承载力',text:'您当前最主要的收入来源是？',opts:['不稳定的劳务或经营收入，勉强覆盖开销','稳定的工资或退休金，正在积攒本金','稳定的工资加可观的投资收益，被动收入能覆盖部分开销','大量生息资产或企业分红，被动收入远超生活开销']},
    {id:29,dim:'C',name:'认知复杂度',text:'对于投资中的杠杆，您最认同哪一项？',opts:['不太懂，但觉得能放大收益就是好东西','牛市可以用，熊市要卸掉','杠杆是双刃剑，需要极精密的计算和极高的安全垫','杠杆不仅是资金结构，更是识别财务脆弱性的核心工具']},
    {id:30,dim:'E',name:'情绪波动性',text:'账户的浮盈创新高时，您更倾向于？',opts:['立刻止盈，落袋为安，生怕跌没了','卖出一部分锁定利润，心安一些','按既定策略止盈，强忍住卖出的冲动','只要逻辑不变就继续持有，让利润奔跑']}
  ];

  const dimCfg = {
    F:{name:'财务承载力',qs:[4,7,10,13,19,23,28],levels:['脆弱型','稳健型','强韧型','极高型'],ranges:[[7,12],[13,18],[19,24],[25,28]],color:'#e17055'},
    E:{name:'情绪波动性',qs:[1,5,9,14,17,21,25,30],levels:['敏感型','中庸型','冷静型','冷漠型'],ranges:[[8,13],[14,20],[21,27],[28,32]],color:'#6c5ce7'},
    C:{name:'认知复杂度',qs:[3,6,11,15,18,22,26,29],levels:['基础型','进阶型','专业型','构建型'],ranges:[[8,13],[14,20],[21,27],[28,32]],color:'#00b894'},
    T:{name:'流动性周期',qs:[2,8,12,16,20,24,27],levels:['超短钱','战术钱','战略钱','永续钱'],ranges:[[7,12],[13,18],[19,24],[25,28]],color:'#0984e3'}
  };

  const typeData = new Map([

  function getType(code) {
    const found = typeData.get(code);
    if (found) return found;
    const parts = code.split('-');
    const fL = parseInt(parts[0].slice(1));
    const eL = parseInt(parts[1].slice(1));
    const cL = parseInt(parts[2].slice(1));
    const tL = parseInt(parts[3].slice(1));
    const fNames = ['脆弱','稳健','强韧','极高'];
    const eNames = ['敏感','中庸','冷静','冷漠'];
    const cNames = ['基础','进阶','专业','构建'];
    const tNames = ['超短钱','战术钱','战略钱','永续钱'];
    return { name: `${fNames[fL-1]}·${eNames[eL-1]}·${cNames[cL-1]}·${tNames[tL-1]}投资者`, desc:'该类型由四维综合定义。', keywords:'' };
  }

  function getLevel(score, ranges) {
    for (let i=0; i<ranges.length; i++) if (score>=ranges[i][0] && score<=ranges[i][1]) return i+1;
    return 1;
  }

  function renderQuestion() {
    const q = questions[state.currentIdx];
    document.getElementById('qText').textContent = `第${state.currentIdx+1}题：${q.text}`;
    document.getElementById('progText').textContent = `${state.currentIdx+1}/30`;
    document.getElementById('progFill').style.width = `${((state.currentIdx+1)/30)*100}%`;
    const tag = document.getElementById('dimTag');
    tag.textContent = q.name;
    tag.className = 'dim-tag dim-'+q.dim;
    const ol = document.getElementById('qOptions');
    ol.innerHTML = '';
    const letters = ['A','B','C','D'];
    q.opts.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option-item';
      div.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
      div.addEventListener('click', () => selectOption(i));
      if (state.answers[state.currentIdx] === i) div.classList.add('selected');
      ol.appendChild(div);
    });
    document.getElementById('btnPrev').style.display = state.currentIdx === 0 ? 'none' : 'inline-block';
    document.getElementById('btnNext').textContent = state.currentIdx === 29 ? '查看结果 🎯' : '下一题 ➡';
    document.getElementById('btnNext').disabled = state.answers[state.currentIdx] === null;
    document.getElementById('penguinZone').style.display = 'none';
  }

      E: { low:['😰 别太紧张','💗 心跳加速了吧'], mid:['😌 情绪还算稳定','🤔 偶尔焦虑很正常'], high:['😎 冷静从容','🧘 心态超稳'], top:['🗿 冷漠到极致','😐 完全不受情绪影响'] },
      C: { low:['📚 慢慢积累知识','🔰 新手阶段'], mid:['🎓 有一定认知','📈 进阶中的学习者'], high:['🧠 专业级别认知','🎯 能穿透本质'], top:['🏗️ 构建型思维','🧩 组装完整框架'] },
      T: { low:['⏰ 资金期限短','💨 快进快出'], mid:['📅 中期资金','🕐 战术型配置'], high:['🔭 战略眼光长远','🌳 长期资金'], top:['♾️ 永续钱','🏛️ 财富传承视角'] }
    };
    const ranges = dimCfg[dim].ranges;
    let tendency = 'mid';
    const score = index+1;
    for (let i=0; i<ranges.length; i++) if (score>=ranges[i][0] && score<=ranges[i][1]) { tendency = ['low','mid','high','top'][i]; break; }
    const arr = responses[dim][tendency];
    document.getElementById('penguinBubble').textContent = arr[Math.floor(Math.random()*arr.length)];
    document.getElementById('penguinZone').style.display = 'block';
  }
  function nextQuestion() {
    if (state.currentIdx < 29) { state.currentIdx++; renderQuestion(); }
    else calculateResults();
  }
  function prevQuestion() { if (state.currentIdx > 0) { state.currentIdx--; renderQuestion(); } }

  function calculateResults() {
    const scores = { F:0,E:0,C:0,T:0 };
    for (let d in dimCfg) {
      dimCfg[d].qs.forEach(id => { const a = state.answers[id-1]; if (a!==null) scores[d] += a+1; });
    }
    state.scores = scores;
    state.resultCode = `F${getLevel(scores.F,dimCfg.F.ranges)}-E${getLevel(scores.E,dimCfg.E.ranges)}-C${getLevel(scores.C,dimCfg.C.ranges)}-T${getLevel(scores.T,dimCfg.T.ranges)}`;
    recordResult(state.resultCode);
    showPage('Result');
    renderResult();
  }

  function renderResult() {
    const code = state.resultCode;
    const td = getType(code);
    document.getElementById('resCode').textContent = code;
    document.getElementById('resName').textContent = td.name;
    document.getElementById('resDesc').textContent = td.desc;
    document.getElementById('resKeywords').innerHTML = td.keywords.split('、').map(k => `<span style="background:#eef2ff;padding:4px 12px;border-radius:16px;margin:2px;display:inline-block;font-weight:500;">${k}</span>`).join('');
    const emojiMap = { F:{1:'🥚',2:'🐣',3:'🐥',4:'🐔'}, E:{1:'😰',2:'😟',3:'😌',4:'😎'}, C:{1:'📚',2:'📖',3:'📊',4:'🧠'}, T:{1:'⏱️',2:'🕰️',3:'⌛',4:'⏳'} };
    const fL = getLevel(state.scores.F,dimCfg.F.ranges);
    const eL = getLevel(state.scores.E,dimCfg.E.ranges);
    const cL = getLevel(state.scores.C,dimCfg.C.ranges);
    const tL = getLevel(state.scores.T,dimCfg.T.ranges);
    document.getElementById('resultEmojis').textContent = `${emojiMap.F[fL]} ${emojiMap.E[eL]} ${emojiMap.C[cL]} ${emojiMap.T[tL]}`;
    const counts = JSON.parse(localStorage.getItem('irti_counts') || '{"_total":0}');
    const total = counts._total || 0;
    const mine = counts[code] || 0;
    document.getElementById('resCount').textContent = `你是第 ${mine} 位该类型的人，占总参与人数的 ${total ? ((mine/total)*100).toFixed(1) : '0.0'}%`;
    let dimHTML = '<h4>📊 维度分析</h4>';
    for (let d of ['F','E','C','T']) {
      const cfg = dimCfg[d];
      const sc = state.scores[d];
      const lv = getLevel(sc, cfg.ranges);
      const max = cfg.ranges[cfg.ranges.length-1][1];
      const pct = Math.min(100, (sc/max)*100);
      dimHTML += `<div style="display:flex;align-items:center;margin:6px 0;"><b style="width:80px;">${cfg.name}</b><div style="flex:1;height:6px;background:#eee;margin:0 10px;border-radius:3px;"><div style="width:${pct}%;height:100%;background:${cfg.color};border-radius:3px;"></div></div><span style="font-size:0.8rem;">${sc}分 · ${cfg.levels[lv-1]}</span></div>`;
    }
    document.getElementById('resDims').innerHTML = dimHTML;
  }

  function recordResult(code) {
    let cnt = JSON.parse(localStorage.getItem('irti_counts') || '{"_total":0}');
    cnt[code] = (cnt[code]||0)+1;
    cnt._total = (cnt._total||0)+1;
    localStorage.setItem('irti_counts', JSON.stringify(cnt));
    let hist = JSON.parse(localStorage.getItem('irti_history') || '[]');
    hist.unshift({ code, time: new Date().toLocaleString(), scores: state.scores });
    if (hist.length > 5) hist.length = 5;
    localStorage.setItem('irti_history', JSON.stringify(hist));
  }

  function showHistory() {
    const hist = JSON.parse(localStorage.getItem('irti_history') || '[]');
    if (!hist.length) return alert('暂无历史记录');
    const container = document.createElement('div');
    container.innerHTML = '<h3>📋 历史记录</h3>' + hist.map(h => `<div style="padding:10px;border:1px solid #eee;margin:6px;cursor:pointer;border-radius:8px;" onclick="document.getElementById('tempModal').style.display='none';window.__restoreResult('${h.code}',${JSON.stringify(h.scores)})">${h.code} · ${getType(h.code).name}<br><small>${h.time}</small></div>`).join('');
    showModal(container.innerHTML);
  }
  window.__restoreResult = function(code, scores) {
    state.resultCode = code;
    state.scores = scores;
    showPage('Result');
    renderResult();
  };
  function showModal(html) {
    let modal = document.getElementById('tempModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'tempModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
      modal.addEventListener('click', e => { if (e.target===modal) modal.style.display='none'; });
      document.body.appendChild(modal);
    }
    modal.innerHTML = `<div style="background:#fff;border-radius:20px;padding:24px;max-width:500px;width:90%;max-height:70vh;overflow-y:auto;">${html}<button style="margin-top:10px;float:right;" class="btn btn-outline" onclick="document.getElementById('tempModal').style.display='none'">关闭</button></div>`;
    modal.style.display = 'flex';
  }

  function openBrowse() {
    state.browseFilters = {F:[],E:[],C:[],T:[]};
    state.browsePage = 0;
    showPage('Browse');
    renderBrowse();
  }
  function getAllCodes() {
    const codes = [];
    for (let f=1; f<=4; f++) for (let e=1; e<=4; e++) for (let c=1; c<=4; c++) for (let t=1; t<=4; t++) codes.push(`F${f}-E${e}-C${c}-T${t}`);
    return codes;
  }
  function filterCodes() {
    let codes = getAllCodes();
    const f = state.browseFilters;
    if (!Object.values(f).some(a => a.length)) return codes;
    return codes.filter(code => {
      const parts = code.split('-');
      const fL = parseInt(parts[0].slice(1));
      const eL = parseInt(parts[1].slice(1));
      const cL = parseInt(parts[2].slice(1));
      const tL = parseInt(parts[3].slice(1));
      if (f.F.length && !f.F.includes(fL)) return false;
      if (f.E.length && !f.E.includes(eL)) return false;
      if (f.C.length && !f.C.includes(cL)) return false;
      if (f.T.length && !f.T.includes(tL)) return false;
      return true;
    });
  }
  function renderBrowse() {
    const filtered = filterCodes();
    const perPage = 8;
    const totalPages = Math.ceil(filtered.length / perPage);
    if (state.browsePage >= totalPages) state.browsePage = Math.max(0, totalPages-1);
    const start = state.browsePage * perPage;
    const pageItems = filtered.slice(start, start+perPage);
    const grid = document.getElementById('browseGrid');
    grid.innerHTML = '';
    pageItems.forEach(code => {
      const td = getType(code);
      const card = document.createElement('div');
      card.className = 'browse-card';
      card.innerHTML = `<div style="font-weight:700;letter-spacing:1px;">${code}</div><div style="font-size:0.7rem;color:#555;">${td.name}</div>`;
      card.addEventListener('click', () => showModal(`<h3>${code}</h3><h4>${td.name}</h4><p>${td.desc}</p><div style="display:flex;flex-wrap:wrap;gap:4px;">${td.keywords.split('、').map(k=>`<span style="background:#eef2ff;padding:2px 10px;border-radius:12px;font-size:0.7rem;">${k}</span>`).join('')}</div>`));
      grid.appendChild(card);
    });
    document.getElementById('browseCount').textContent = `共 ${filtered.length} 种类型`;
    const pag = document.getElementById('pagination');
    let html = '';
    if (totalPages > 1) {
      html += `<button class="btn btn-outline btn-sm" onclick="window.__browsePage(${state.browsePage-1})" ${state.browsePage===0?'disabled':''}>上一页</button>`;
      html += `<span style="margin:0 8px;">${state.browsePage+1}/${totalPages}</span>`;
      html += `<button class="btn btn-outline btn-sm" onclick="window.__browsePage(${state.browsePage+1})" ${state.browsePage>=totalPages-1?'disabled':''}>下一页</button>`;
    }
    pag.innerHTML = html;
    const groups = document.getElementById('filterGroups');
    groups.innerHTML = '';
    for (let d of ['F','E','C','T']) {
      let row = `<div style="margin:4px 0;"><b>${d}</b> `;
      for (let lv=1; lv<=4; lv++) {
        const active = state.browseFilters[d].includes(lv);
        row += `<span class="filter-chip${active?' active':''}" data-dim="${d}" data-lv="${lv}">${dimCfg[d].levels[lv-1]}</span> `;
      }
      row += '</div>';
      groups.innerHTML += row;
    }
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        const d = this.dataset.dim, lv = parseInt(this.dataset.lv);
        const arr = state.browseFilters[d];
        const idx = arr.indexOf(lv);
        if (idx>=0) arr.splice(idx,1); else arr.push(lv);
        state.browsePage = 0;
        renderBrowse();
      });
    });
  }
  window.__browsePage = page => { state.browsePage = page; renderBrowse(); };

  document.getElementById('btnStart').addEventListener('click', startTest);
  document.getElementById('btnHistory').addEventListener('click', showHistory);
  document.getElementById('btnPrev').addEventListener('click', prevQuestion);
  document.getElementById('btnNext').addEventListener('click', nextQuestion);
  document.getElementById('btnRestart').addEventListener('click', startTest);
  document.getElementById('btnBrowse').addEventListener('click', openBrowse);
  document.getElementById('btnBackBrowse').addEventListener('click', () => { showPage('Result'); renderResult(); });
  document.getElementById('btnClearFilters').addEventListener('click', () => { state.browseFilters = {F:[],E:[],C:[],T:[]}; state.browsePage=0; renderBrowse(); });
  document.getElementById('btnAntarctic').addEventListener('click', () => window.open('https://yindon2.github.io/nanshi-market/', '_blank'));
  document.getElementById('btnGenius').addEventListener('click', () => window.open('https://yindon2.github.io/penguin-genius/', '_blank'));

  window.addEventListener('keydown', e => {
    if (state.page === 'Test') {
      if (e.key>='1' && e.key<='4') selectOption(parseInt(e.key)-1);
      if (e.key==='ArrowRight' && state.answers[state.currentIdx]!==null) nextQuestion();
      if (e.key==='ArrowLeft') prevQuestion();
    }
    if (e.key==='Escape') { const m = document.getElementById('tempModal'); if (m) m.style.display='none'; }
  });

  console.log('✅ IRTI 脚本已成功加载，所有功能就绪。');
})();
</script>
</body>
</html>
